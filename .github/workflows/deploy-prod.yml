name: Deploy to Azure Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only runs on SaleBoomSEO/SEO_Integration — secrets and infra live there
# sm1523dev/saleboom-seo main → Pi (deploy-dev.yml handles that)

jobs:
  deploy-app:
    name: Build & Deploy Next.js App
    runs-on: ubuntu-latest
    if: github.repository == 'SaleBoomSEO/SEO_Integration'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/saleboom-app:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/saleboom-app:latest
          build-args: |
            AUTH_SECRET=build-placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Container App
        env:
          IMAGE: ${{ secrets.REGISTRY_LOGIN_SERVER }}/saleboom-app:${{ github.sha }}
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP: ${{ secrets.CONTAINER_APP_NAME }}
        run: |
          az containerapp update \
            --resource-group "$RG" \
            --name "$APP" \
            --image "$IMAGE"

  deploy-functions:
    name: Build & Deploy Azure Functions
    runs-on: ubuntu-latest
    if: github.repository == 'SaleBoomSEO/SEO_Integration'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install and build Functions
        working-directory: azure-functions
        run: |
          npm ci
          node build.mjs

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Functions
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          FN: ${{ secrets.FUNCTIONS_APP_NAME }}
        run: |
          cd azure-functions
          mkdir -p deploy-pkg/dist
          cp host.json deploy-pkg/
          cp package.json deploy-pkg/
          cp dist/index.js deploy-pkg/dist/
          cd deploy-pkg && zip -r ../functions.zip . && cd ..
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$FN" \
            --src functions.zip
