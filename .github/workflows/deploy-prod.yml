name: Deploy to Azure Production

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Build & Deploy Next.js App
    runs-on: ubuntu-latest
    # Only deploy from the Azure org repo — secrets live there
    if: github.repository == 'SaleBoomSEO/SEO_Integration'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/saleboom-app:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/saleboom-app:latest
          build-args: |
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Container App
        env:
          IMAGE_TAG: ${{ github.sha }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
          REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          NIM_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          PW_PEPPER: ${{ secrets.PASSWORD_PEPPER }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_CONN: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          FC_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          KV_URI: ${{ secrets.AZURE_KEYVAULT_URI }}
          GH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --image "$REGISTRY/saleboom-app:$IMAGE_TAG" \
            --set-env-vars \
              "NODE_ENV=production" \
              "QUEUE_PROVIDER=azure-queue" \
              "STORAGE_PROVIDER=azure-blob" \
              "AZURE_STORAGE_CONTAINER=saleboom" \
              "AI_PROVIDER=$AI_PROVIDER" \
              "NVIDIA_NIM_API_KEY=$NIM_KEY" \
              "AUTH_SECRET=$AUTH_SECRET" \
              "PASSWORD_PEPPER=$PW_PEPPER" \
              "DATABASE_URL=$DB_URL" \
              "AZURE_STORAGE_CONNECTION_STRING=$STORAGE_CONN" \
              "FIRECRAWL_API_KEY=$FC_KEY" \
              "AZURE_KEYVAULT_URI=$KV_URI" \
              "GITHUB_OAUTH_CLIENT_ID=$GH_CLIENT_ID" \
              "GITHUB_OAUTH_CLIENT_SECRET=$GH_CLIENT_SECRET"

  deploy-functions:
    name: Build & Deploy Azure Functions
    runs-on: ubuntu-latest
    if: github.repository == 'SaleBoomSEO/SEO_Integration'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci
        working-directory: azure-functions

      - name: Build Functions bundle
        run: node build.mjs
        working-directory: azure-functions

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Package and deploy Functions
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          FUNCTIONS_APP: ${{ secrets.FUNCTIONS_APP_NAME }}
        run: |
          cd azure-functions
          mkdir -p deploy-pkg
          cp host.json deploy-pkg/
          cp package.json deploy-pkg/
          cp dist/index.js deploy-pkg/
          cd deploy-pkg && zip -r ../functions.zip . && cd ..
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTIONS_APP" \
            --src functions.zip
