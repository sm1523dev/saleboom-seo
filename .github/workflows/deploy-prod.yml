name: Deploy — Azure Prod

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/sm1523dev/saleboomseo
  IMAGE_WORKER: ghcr.io/sm1523dev/saleboomseo-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Next.js app (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:prod
            ${{ env.IMAGE_APP }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:prod
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Azure deploy steps — uncomment and configure when Azure account is ready.
      # Required secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
      #                   AZURE_RESOURCE_GROUP, AZURE_APP_NAME
      #
      # - name: Azure login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #
      # - name: Deploy Next.js to Azure App Service
      #   run: |
      #     IMAGE="${{ env.IMAGE_APP }}:${{ github.sha }}"
      #     az webapp config container set \
      #       --resource-group "$AZURE_RG" \
      #       --name "$AZURE_APP" \
      #       --container-image-name "$IMAGE"
      #   env:
      #     AZURE_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
      #     AZURE_APP: ${{ secrets.AZURE_APP_NAME }}
      #
      # - name: Deploy Azure Functions (worker)
      #   run: |
      #     cd azure-functions
      #     npm ci && npm run build
      #     func azure functionapp publish "$FUNC_APP"
