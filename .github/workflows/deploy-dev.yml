name: Deploy — Pi

on:
  push:
    branches: ["**"]

# Guard: only runs when pushed to sm1523dev/saleboom-seo.
# This file also lives in the Azure repo but must not run there.

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/sm1523dev/saleboomseo
  IMAGE_WORKER: ghcr.io/sm1523dev/saleboomseo-worker

jobs:
  build:
    if: github.repository == 'sm1523dev/saleboom-seo'
    name: Build & Push ARM64 Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:latest
            ${{ env.IMAGE_APP }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.repository == 'sm1523dev/saleboom-seo'
    name: Deploy to Pi
    runs-on: [self-hosted, linux, arm64]
    needs: build
    permissions:
      packages: read

    steps:
      - name: Pull app image into k3s
        run: |
          sudo k3s ctr images pull \
            --user "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            ${{ env.IMAGE_APP }}:latest

      - name: Pull worker image into k3s
        run: |
          sudo k3s ctr images pull \
            --user "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            ${{ env.IMAGE_WORKER }}:latest

      - name: Rollout restart
        run: |
          sudo k3s kubectl rollout restart deployment/nextjs deployment/worker -n saleboomseo
          sudo k3s kubectl rollout status deployment/nextjs -n saleboomseo --timeout=120s
          sudo k3s kubectl rollout status deployment/worker -n saleboomseo --timeout=120s
