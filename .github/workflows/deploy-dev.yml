name: Deploy — Pi Dev

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/sm1523dev/saleboomseo
  IMAGE_WORKER: ghcr.io/sm1523dev/saleboomseo-worker

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Next.js app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:latest
            ${{ env.IMAGE_APP }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Pi
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull images into k3s
        run: |
          sudo k3s ctr images pull ${{ env.IMAGE_APP }}:latest
          sudo k3s ctr images pull ${{ env.IMAGE_WORKER }}:latest

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/nextjs deployment/worker -n saleboomseo
          kubectl rollout status deployment/nextjs -n saleboomseo --timeout=120s
          kubectl rollout status deployment/worker -n saleboomseo --timeout=120s
