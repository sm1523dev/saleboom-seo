apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: saleboomseo
  annotations:
    ttlSecondsAfterFinished: "600"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/sm1523dev/saleboomseo:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "db:migrate"]
          envFrom:
            - secretRef:
                name: saleboomseo-secrets
